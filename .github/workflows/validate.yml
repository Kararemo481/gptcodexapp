name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Inspect repository
        run: |
          test -f README.md
          find . -maxdepth 3 -type f | sort
