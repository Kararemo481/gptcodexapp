name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate expected files
        run: |
          test -f README.md
          test -f index.html
          test -f styles.css
          test -f scripts/app.js
          test -f assets/workflow-map.svg
          test -f .github/workflows/pages.yml

      - name: Inspect repository
        run: find . -maxdepth 3 -type f | sort
